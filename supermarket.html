<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#be185d"/>
  <title>سوبرماركت - خطوة التوصيل</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root{--rose:#be185d;--rose-dark:#9d174d;--rose-light:#fce7f3;--rose-soft:#fff1f6;--text:#1f1f1f;--muted:#6b7280;--border:#f0e4e9;--bg:#f5f5f5;--white:#fff;--green:#16a34a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;direction:rtl}
    .topbar{background:var(--rose);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .btn-back{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
    .topbar-title{font-size:16px;font-weight:700;color:#fff;flex:1}
    .cart-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
    .cart-dot{position:absolute;top:-4px;left:-4px;width:16px;height:16px;background:#fff;color:var(--rose);border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .search-wrap{background:var(--rose-dark);padding:0 16px 10px}
    .search-box{background:#fff;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px}
    .search-box input{border:none;outline:none;font-size:13px;color:var(--text);width:100%;font-family:'Tajawal',sans-serif;background:transparent;direction:rtl}
    .promo-banner{margin:12px 16px 0;border-radius:16px;overflow:hidden;position:relative;height:85px;display:flex;align-items:center;padding:16px;background:linear-gradient(135deg,#9d174d,#7c3aed)}
    .promo-banner::before{content:'';position:absolute;width:110px;height:110px;background:rgba(255,255,255,0.06);border-radius:50%;left:-20px;top:-20px}
    .promo-text{flex:1;position:relative;z-index:1}
    .promo-title{font-size:15px;font-weight:700;color:#fff}
    .promo-sub{font-size:11px;color:#fce7f3;margin-top:3px}
    .promo-cta{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:20px;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;position:relative;z-index:1;white-space:nowrap}
    .sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
    .sec-title{font-size:15px;font-weight:700;color:var(--text)}
    .sec-count{font-size:11px;color:var(--muted);background:#f3f4f6;padding:2px 10px;border-radius:20px}
    .cats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px 16px}
    .cat-card{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;border:0.5px solid var(--border);transition:transform 0.15s}
    .cat-card:active{transform:scale(0.96)}
    .cat-img-wrap{height:110px;overflow:hidden;background:#f9f9f9;position:relative}
    .cat-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
    .cat-card:active .cat-img-wrap img{transform:scale(1.05)}
    .cat-info{padding:9px 11px 11px}
    .cat-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
    .cat-sub{font-size:10px;color:var(--muted)}
    .offer-strip{margin:0 16px 16px;background:#fff;border-radius:14px;border:0.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .offer-btn{background:var(--rose);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;flex-shrink:0}
    .glass-nav-wrap{position:fixed;bottom:0;right:50%;transform:translateX(50%);width:100%;max-width:480px;padding:8px 16px 12px;background:linear-gradient(to top,rgba(245,245,245,1) 60%,rgba(245,245,245,0));pointer-events:none;z-index:200}
    .glass-nav{background:rgba(255,255,255,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid rgba(255,255,255,0.95);border-radius:26px;padding:8px 6px;display:grid;grid-template-columns:repeat(4,1fr);box-shadow:0 4px 28px rgba(0,0,0,0.09);pointer-events:all}
    .gnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 4px;border-radius:20px;transition:background 0.2s}
    .gnav-item:active{background:rgba(190,24,93,0.08)}
    .gnav-icon{font-size:22px;color:var(--muted)}
    .gnav-icon.act{color:var(--rose)}
    .gnav-label{font-size:10px;color:var(--muted);font-weight:700}
    .gnav-label.act{color:var(--rose)}
    .gnav-dot{width:4px;height:4px;background:var(--rose);border-radius:50%;margin:0 auto;opacity:0}
    .gnav-dot.act{opacity:1}
  </style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="window.location.href='/'" aria-label="رجوع"><i class="ti ti-arrow-right"></i></button>
  <button class="btn-back" id="back-btn" style="display:none" onclick="resetToMain()" aria-label="رجوع للفئات"><i class="ti ti-arrow-right"></i></button>
  <div class="topbar-title" id="page-heading">سوبرماركت · قبة</div>
  <button class="cart-btn" onclick="window.location.href='/pages/cart.html'" aria-label="السلة">
    <i class="ti ti-shopping-cart" style="font-size:18px"></i>
    <div class="cart-dot" id="cart-count">٠</div>
  </button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <i class="ti ti-search" style="font-size:16px;color:var(--rose)" aria-hidden="true"></i>
    <input type="text" placeholder="ابحث في السوبرماركت..." oninput="filterCats(this.value)"/>
  </div>
</div>

<div class="promo-banner">
  <div class="promo-text">
    <div class="promo-title">توصيل مجاني</div>
    <div class="promo-sub">على الطلبات فوق ٢٠٠ ريال · قبة</div>
  </div>
  <button class="promo-cta" onclick="window.location.href='/pages/catalog.html'">تسوق الآن</button>
</div>

<div class="sec-head">
  <div class="sec-title">تسوق حسب الفئة</div>
  <div class="sec-count" id="cat-count">١٢ فئة</div>
</div>

<div class="cats-grid" id="cats-grid"></div>

<div class="offer-strip">
  <div>
    <div style="font-size:13px;font-weight:700;color:var(--text)">عروض اليوم</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">خصم حتى ٤٠٪ على منتجات مختارة</div>
  </div>
  <button class="offer-btn" onclick="window.location.href='/pages/catalog.html'">شاهد العروض</button>
</div>

<div class="glass-nav-wrap">
  <nav class="glass-nav">
    <div class="gnav-item" onclick="window.location.href='/'">
      <i class="ti ti-home gnav-icon" aria-hidden="true"></i>
      <span class="gnav-label">الرئيسية</span>
      <div class="gnav-dot"></div>
    </div>
    <div class="gnav-item" onclick="window.location.href='/pages/restaurants.html'">
      <i class="ti ti-tools-kitchen-2 gnav-icon" aria-hidden="true"></i>
      <span class="gnav-label">المطاعم</span>
      <div class="gnav-dot"></div>
    </div>
    <div class="gnav-item">
      <i class="ti ti-building-store gnav-icon act" aria-hidden="true"></i>
      <span class="gnav-label act">سوبرماركت</span>
      <div class="gnav-dot act"></div>
    </div>
    <div class="gnav-item" onclick="window.location.href='/pages/account.html'">
      <i class="ti ti-user-circle gnav-icon" aria-hidden="true"></i>
      <span class="gnav-label">حسابي</span>
      <div class="gnav-dot"></div>
    </div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://vjuhxpttssmyomqqomdx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdWh4cHR0c3NteW9tcXFvbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjQxNjAsImV4cCI6MjA5NDUwMDE2MH0.JiGnmOEPPM3dka-KHIm5mEFs7GWb4Amsnp6R57r7Lro';
const sb=supabase.createClient(SB_URL,SB_KEY);

let allCats = [];

async function loadCatsFromDB() {
  try {
    const {data,error} = await sb.from('supermarket_categories')
      .select('*')
      .eq('is_active',true)
      .is('parent_name', null)  /* Only main categories - no sub-categories */
      .order('sort_order');
    if (!error && data && data.length) {
      allCats = data;
    } else {
      allCats = getDefaultCats();
    }
  } catch(e) { allCats = getDefaultCats(); }
  renderCats(allCats);
}

function getDefaultCats(){
  return[
    {name:'فواكه وخضروات',image_url:'https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=300&q=70',bg_color:'#f0fdf4'},
    {name:'ألبان وبيض',image_url:'https://images.unsplash.com/photo-1550583724-b2692b85b150?w=300&q=70',bg_color:'#fffbeb'},
    {name:'لحوم ودواجن',image_url:'https://images.unsplash.com/photo-1582034986517-30d163aa1da9?w=300&q=70',bg_color:'#faf5ff'},
    {name:'مشروبات باردة',image_url:'https://images.unsplash.com/photo-1581006852262-e4307cf6283a?w=300&q=70',bg_color:'#eff6ff'},
    {name:'خبز ومخبوزات',image_url:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300&q=70',bg_color:'#fff5f7'},
    {name:'أرز ومعكرونة',image_url:'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=300&q=70',bg_color:'#f0fdf4'},
    {name:'بهارات وتوابل',image_url:'https://images.unsplash.com/photo-1534483509719-3feaee7c30da?w=300&q=70',bg_color:'#fffbeb'},
    {name:'حليب وعصائر',image_url:'https://images.unsplash.com/photo-1563636619-e9143da7973b?w=300&q=70',bg_color:'#f0f9ff'},
    {name:'معلبات وجاهزة',image_url:'https://images.unsplash.com/photo-1542838132-92c53300491e?w=300&q=70',bg_color:'#f9fafb'},
    {name:'حلويات وسناكس',image_url:'https://images.unsplash.com/photo-1621939514649-280e2ee25f60?w=300&q=70',bg_color:'#fdf4ff'},
    {name:'منتجات التنظيف',image_url:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=300&q=70',bg_color:'#fff7ed'},
    {name:'عناية شخصية',image_url:'https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=300&q=70',bg_color:'#f0fdf4'},
  ];
}

function renderCats(list) {
  document.getElementById('cat-count').textContent = list.length + ' فئة';
  document.getElementById('cats-grid').innerHTML = list.map(c => `
    <div class="cat-card" onclick="goToCategory('${c.name}')">
      <div class="cat-img-wrap" style="background:${c.bg_color||'#f0fdf4'}">
        ${c.image_url
          ? `<img src="${c.image_url}" alt="${c.name}" loading="lazy"/>`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px">🛒</div>`}
      </div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
      </div>
    </div>`).join('');
}

function resetToMain() {
  document.getElementById('page-heading').textContent = 'سوبرماركت · قبة';
  document.getElementById('back-btn').style.display = 'none';
  renderCats(allCats);
}

function filterCats(q) {
  const filtered = q ? allCats.filter(c => c.name.includes(q)) : allCats;
  renderCats(filtered);
}

async function goToCategory(name) {
  // Check if this category has sub-categories
  try {
    const {data} = await sb.from('supermarket_categories')
      .select('id, name, image_url, bg_color')
      .eq('parent_name', name)
      .eq('is_active', true)
      .order('sort_order');

    if (data && data.length > 0) {
      // Has sub-categories → show them
      showSubCategories(name, data);
    } else {
      // No sub-categories → go directly to products
      sessionStorage.setItem('qibah_cat', name);
      window.location.href = '/pages/supermarket-products.html?cat=' + encodeURIComponent(name);
    }
  } catch(e) {
    sessionStorage.setItem('qibah_cat', name);
    window.location.href = '/pages/supermarket-products.html?cat=' + encodeURIComponent(name);
  }
}

function showSubCategories(parentName, subs) {
  // Show sub-categories in the same page
  document.getElementById('page-heading').textContent = parentName;
  document.getElementById('back-btn').style.display = 'flex';
  document.getElementById('cat-count').textContent = subs.length + ' فئة';

  document.getElementById('cats-grid').innerHTML = subs.map(c => `
    <div class="cat-card" onclick="sessionStorage.setItem('qibah_cat','${c.name}');window.location.href='/pages/supermarket-products.html?cat=${encodeURIComponent(c.name)}'">
      <div class="cat-img-wrap" style="background:${c.bg_color||'#f0fdf4'}">
        ${c.image_url
          ? `<img src="${c.image_url}" alt="${c.name}" loading="lazy"/>`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px">🛒</div>`}
      </div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
      </div>
    </div>`).join('');
}

function updateCart() {
  const cart = JSON.parse(localStorage.getItem('qibah_cart') || '[]');
  document.getElementById('cart-count').textContent = cart.reduce((s,i) => s+i.qty, 0) || '٠';
}

window.addEventListener('load', () => { updateCart(); loadCatsFromDB(); });
</script>
</body>
</html>
