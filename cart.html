<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#be185d"/>
  <title>سلة التسوق - خطوة التوصيل</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    :root{--rose:#be185d;--rose-dark:#9d174d;--rose-light:#fce7f3;--rose-soft:#fff1f6;--text:#1f1f1f;--muted:#6b7280;--border:#f0e4e9;--bg:#f9f9f9;--white:#fff;--green:#16a34a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:100px;direction:rtl}
    .topbar{background:var(--rose);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .btn-back{background:rgba(255,255,255,0.2);border:none;color:#fff;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
    .topbar-title{font-size:16px;font-weight:700;color:#fff;flex:1}
    .body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .card{background:#fff;border:0.5px solid var(--border);border-radius:16px;padding:14px}
    .card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .card-title i{color:var(--rose);font-size:16px}
    .cart-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
    .cart-item:last-of-type{border-bottom:none}
    .item-icon{width:50px;height:50px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--rose-soft);display:flex;align-items:center;justify-content:center;font-size:24px}
    .item-icon img{width:100%;height:100%;object-fit:cover}
    .item-body{flex:1}
    .item-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
    .item-price{font-size:12px;color:var(--rose-dark);font-weight:700}
    .qty-ctrl{display:flex;align-items:center;gap:8px}
    .qty-btn{width:28px;height:28px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.2s}
    .qty-m{background:var(--rose-light);color:var(--rose)}
    .qty-p{background:var(--rose);color:#fff}
    .qty-n{font-size:14px;font-weight:700;min-width:20px;text-align:center}
    .row-total{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:0.5px solid var(--border)}
    .row-total:last-of-type{border-bottom:none}
    .grand-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding:10px 0 0;border-top:1px solid var(--border);margin-top:6px}
    .grand-total .v{color:var(--rose-dark)}
    .empty-cart{text-align:center;padding:4rem 2rem}
    .empty-cart i{font-size:64px;color:var(--rose-light);display:block;margin-bottom:1rem}
    .empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
    .empty-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
    .checkout-bar{position:fixed;bottom:0;right:50%;transform:translateX(50%);width:100%;max-width:480px;background:#fff;border-top:0.5px solid var(--border);padding:12px 16px;z-index:100}
    .checkout-btn{width:100%;background:var(--rose);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Tajawal',sans-serif;box-shadow:0 4px 12px rgba(190,24,93,0.3);transition:all 0.2s}
    .checkout-btn:active{background:var(--rose-dark)}
    .promo-wrap{display:flex;gap:8px;margin-top:10px}
    .promo-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:'Tajawal',sans-serif;color:var(--text);direction:rtl}
    .promo-input:focus{border-color:var(--rose)}
    .promo-btn{background:var(--rose);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif}
    .toast{position:fixed;bottom:100px;right:50%;transform:translateX(50%);background:#1f1f1f;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="topbar">
  <button class="btn-back" onclick="history.back()" aria-label="رجوع"><i class="ti ti-arrow-right"></i></button>
  <div class="topbar-title">سلة التسوق</div>
  <button onclick="clearCart()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700">مسح الكل</button>
</div>

<div id="cart-content"></div>

<div class="checkout-bar" id="checkout-bar" style="display:none">
  <button class="checkout-btn" onclick="window.location.href='/pages/checkout.html'">
    <i class="ti ti-shopping-cart-check" style="font-size:20px" aria-hidden="true"></i>
    إتمام الطلب · <span id="checkout-total">٠ ريال</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
let promoApplied = false;

function loadCart() {
  const cart = JSON.parse(localStorage.getItem('qibah_cart') || '[]');
  const content = document.getElementById('cart-content');
  const bar = document.getElementById('checkout-bar');

  if (!cart.length) {
    bar.style.display = 'none';
    content.innerHTML = `
      <div class="empty-cart">
        <i class="ti ti-shopping-cart" aria-hidden="true"></i>
        <div class="empty-title">سلتك فارغة!</div>
        <div class="empty-sub">أضف منتجات من المطاعم والمحلات</div>
        <button onclick="window.location.href='/'" style="background:var(--rose);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif">
          تصفح المطاعم
        </button>
      </div>`;
    return;
  }

  const sub = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const del = Number(localStorage.getItem('qibah_delivery_fee')) || (sub >= 200 ? 0 : 5.5);
  const disc = promoApplied ? 10 : 0;
  const tot = sub + del - disc;

  bar.style.display = 'block';
  document.getElementById('checkout-total').textContent = tot.toFixed(2) + ' ريال';

  // Restaurant info
  const rest = JSON.parse(localStorage.getItem('qibah_restaurant') || 'null');
  const restBanner = rest ? `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;background:var(--rose-soft);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🍽️</div>
        <div>
          <div style="font-size:13px;font-weight:700">${rest.name}</div>
          <div style="font-size:11px;color:var(--muted)">طلبك من هذا المطعم</div>
        </div>
      </div>
    </div>` : '';

  content.innerHTML = `
    <div class="body">
      ${restBanner}
      <div class="card">
        <div class="card-title"><i class="ti ti-shopping-bag" aria-hidden="true"></i>منتجاتي (${cart.reduce((s,i)=>s+i.qty,0)} منتج)</div>
        ${cart.map(item => `
          <div class="cart-item">
            <div class="item-icon">
              ${item.image ? `<img src="${item.image}" alt="${item.name}" loading="lazy"/>` : '🛍️'}
            </div>
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-price">SAR ${item.price.toFixed(2)}</div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn qty-m" onclick="changeQty('${item.id}',-1)"><i class="ti ti-minus" style="font-size:11px"></i></button>
              <span class="qty-n">${item.qty}</span>
              <button class="qty-btn qty-p" onclick="changeQty('${item.id}',1)"><i class="ti ti-plus" style="font-size:11px"></i></button>
            </div>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-ticket" aria-hidden="true"></i>رمز الخصم</div>
        <div class="promo-wrap">
          <input class="promo-input" id="promo-input" placeholder="أدخل رمز الخصم مثال KSA94"/>
          <button class="promo-btn" onclick="applyPromo()">تطبيق</button>
        </div>
        <div id="promo-msg" style="font-size:12px;margin-top:6px;display:none"></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-receipt" aria-hidden="true"></i>ملخص الطلب</div>
        <div class="row-total"><span style="color:var(--muted)">المجموع الفرعي</span><span>SAR ${sub.toFixed(2)}</span></div>
        <div class="row-total"><span style="color:var(--muted)">رسوم التوصيل</span><span id="del-val" style="color:${del===0?'var(--green)':'inherit'}">${del===0?'مجاني 🎉':'SAR '+del.toFixed(2)}</span></div>
        ${disc>0?`<div class="row-total"><span style="color:var(--muted)">الخصم</span><span style="color:var(--green)">-SAR ${disc.toFixed(2)}</span></div>`:''}
        <div class="grand-total"><span>الإجمالي</span><span class="v">SAR ${tot.toFixed(2)}</span></div>
      </div>
    </div>`;
}

function changeQty(id, delta) {
  let cart = JSON.parse(localStorage.getItem('qibah_cart') || '[]');
  const idx = cart.findIndex(i => i.id === id);
  if (idx >= 0) {
    cart[idx].qty = Math.max(0, cart[idx].qty + delta);
    if (cart[idx].qty === 0) cart.splice(idx, 1);
  }
  localStorage.setItem('qibah_cart', JSON.stringify(cart));
  loadCart();
}

function clearCart() {
  if (!confirm('هل تريد مسح السلة؟')) return;
  localStorage.removeItem('qibah_cart');
  localStorage.removeItem('qibah_restaurant');
  localStorage.removeItem('qibah_delivery_fee');
  loadCart();
  showToast('تم مسح السلة');
}

function applyPromo() {
  const code = document.getElementById('promo-input').value.trim().toUpperCase();
  const msg = document.getElementById('promo-msg');
  msg.style.display = 'block';
  if (code === 'KSA94') {
    promoApplied = true;
    msg.style.color = '#16a34a';
    msg.textContent = '✓ تم تطبيق الخصم! خصم ١٠ ريال';
    loadCart();
  } else {
    msg.style.color = '#be185d';
    msg.textContent = 'رمز غير صحيح. جرب KSA94';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.addEventListener('load', loadCart);
</script>
</body>
</html>
