workflows:
  android-rider-apk:
    name: Android Rider APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - deliverystep_keystore
      vars:
        PACKAGE_NAME: com.deliverstep.app
        APP_NAME: Delivery Step Rider
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Verify google-services.json
        script: |
          if [ ! -f "android/app/google-services.json" ]; then
            echo "ERROR: google-services.json missing"
            exit 1
          fi
          echo "google-services.json OK"
      - name: Build signed release APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
          echo "=== Built APKs ==="
          find . -name "*.apk" -type f
      - name: Rename APK
        script: |
          find android -name "*.apk" -type f | while read apk; do
            dir=$(dirname "$apk")
            cp "$apk" "$dir/DeliveryStepRider.apk"
          done
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/mapping/**/*.txt
    publishing:
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true

  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.deliverystep.app
        XCODE_PROJECT: ios/DeliveryStep.xcodeproj
        XCODE_SCHEME: DeliveryStep
    scripts:
      - name: Verify icon and Info.plist
        script: |
          ICONSET="ios/DeliveryStep/Assets.xcassets/AppIcon.appiconset"
          echo "=== AppIcon_1024.png ==="
          sips -g pixelWidth -g pixelHeight "$ICONSET/AppIcon_1024.png"
          echo "=== Contents.json ==="
          cat "$ICONSET/Contents.json"
          echo "=== CFBundleIconName in Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" ios/DeliveryStep/Info.plist
      - name: Set up keychain
        script: keychain initialize
      - name: Create certificate and provisioning profile
        script: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /tmp/dist_key.pem
          CERT_OUTPUT=$(app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/dist_key.pem \
            --save 2>&1)
          echo "$CERT_OUTPUT"
          CERT_ID=$(echo "$CERT_OUTPUT" | grep "^Id:" | awk '{print $2}')
          echo "Certificate ID: $CERT_ID"
          keychain add-certificates
          ALL_BUNDLES=$(app-store-connect list-bundle-ids 2>&1)
          echo "$ALL_BUNDLES"
          BUNDLE_RESOURCE_ID=$(echo "$ALL_BUNDLES" | \
            awk '/^Id:/{id=$2} /com\.deliverystep\.app/{print id; exit}')
          echo "Bundle Resource ID: $BUNDLE_RESOURCE_ID"
          app-store-connect profiles create \
            "$BUNDLE_RESOURCE_ID" \
            --type IOS_APP_STORE \
            --certificate-ids "$CERT_ID" \
            --save
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true
