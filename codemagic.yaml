workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      integrations:
        app_store_connect: Codemagic
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.deliverystep.app
      vars:
        BUNDLE_ID: com.deliverystep.app
        XCODE_PROJECT: ios/DeliveryStep.xcodeproj
        XCODE_SCHEME: DeliveryStep
    scripts:
      - name: Generate App Icon
        script: |
          sips -z 1024 1024 play_store_icon_512.png \
            --out ios/DeliveryStep/Assets.xcassets/AppIcon.appiconset/AppIcon_1024.png
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true
