workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.deliverystep.app
        XCODE_PROJECT: ios/DeliveryStep.xcodeproj
        XCODE_SCHEME: DeliveryStep
    scripts:
      - name: Generate all App Icons and fix Info.plist
        script: |
          SOURCE="play_store_icon_512.png"
          ICONSET="ios/DeliveryStep/Assets.xcassets/AppIcon.appiconset"
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size "$SOURCE" --out "$ICONSET/Icon-${size}.png"
          done
          python3 -c "import json,sys; d={'images':[{'filename':'Icon-40.png','idiom':'iphone','scale':'2x','size':'20x20'},{'filename':'Icon-60.png','idiom':'iphone','scale':'3x','size':'20x20'},{'filename':'Icon-58.png','idiom':'iphone','scale':'2x','size':'29x29'},{'filename':'Icon-87.png','idiom':'iphone','scale':'3x','size':'29x29'},{'filename':'Icon-80.png','idiom':'iphone','scale':'2x','size':'40x40'},{'filename':'Icon-120.png','idiom':'iphone','scale':'3x','size':'40x40'},{'filename':'Icon-120.png','idiom':'iphone','scale':'2x','size':'60x60'},{'filename':'Icon-180.png','idiom':'iphone','scale':'3x','size':'60x60'},{'filename':'Icon-20.png','idiom':'ipad','scale':'1x','size':'20x20'},{'filename':'Icon-40.png','idiom':'ipad','scale':'2x','size':'20x20'},{'filename':'Icon-29.png','idiom':'ipad','scale':'1x','size':'29x29'},{'filename':'Icon-58.png','idiom':'ipad','scale':'2x','size':'29x29'},{'filename':'Icon-40.png','idiom':'ipad','scale':'1x','size':'40x40'},{'filename':'Icon-80.png','idiom':'ipad','scale':'2x','size':'40x40'},{'filename':'Icon-76.png','idiom':'ipad','scale':'1x','size':'76x76'},{'filename':'Icon-152.png','idiom':'ipad','scale':'2x','size':'76x76'},{'filename':'Icon-167.png','idiom':'ipad','scale':'2x','size':'83.5x83.5'},{'filename':'Icon-1024.png','idiom':'ios-marketing','scale':'1x','size':'1024x1024'}],'info':{'author':'xcode','version':1}}; json.dump(d,sys.stdout,indent=2)" > "$ICONSET/Contents.json"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" ios/DeliveryStep/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" ios/DeliveryStep/Info.plist
      - name: Set up keychain
        script: keychain initialize
      - name: Create certificate and provisioning profile
        script: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /tmp/dist_key.pem
          CERT_OUTPUT=$(app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/dist_key.pem \
            --save 2>&1)
          echo "$CERT_OUTPUT"
          CERT_ID=$(echo "$CERT_OUTPUT" | grep "^Id:" | awk '{print $2}')
          echo "Certificate ID: $CERT_ID"
          keychain add-certificates
          ALL_BUNDLES=$(app-store-connect list-bundle-ids 2>&1)
          echo "$ALL_BUNDLES"
          BUNDLE_RESOURCE_ID=$(echo "$ALL_BUNDLES" | \
            awk '/^Id:/{id=$2} /com\.deliverystep\.app/{print id; exit}')
          echo "Bundle Resource ID: $BUNDLE_RESOURCE_ID"
          app-store-connect profiles create \
            "$BUNDLE_RESOURCE_ID" \
            --type IOS_APP_STORE \
            --certificate-ids "$CERT_ID" \
            --save
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true
