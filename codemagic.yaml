workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.deliverystep.app
        XCODE_PROJECT: ios/DeliveryStep.xcodeproj
        XCODE_SCHEME: DeliveryStep
    scripts:
      - name: Generate App Icon (1024x1024) from play store icon
        script: |
          sips -z 1024 1024 play_store_icon_512.png \
            --out ios/DeliveryStep/Assets.xcassets/AppIcon.appiconset/AppIcon_1024.png
      - name: Set up keychain
        script: keychain initialize
      - name: Create distribution certificate
        script: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /tmp/dist_key.pem
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/dist_key.pem \
            --save
          keychain add-certificates
      - name: Create App Store provisioning profile
        script: |
          app-store-connect create-profile \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --save
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true
