workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.deliverystep.app
        XCODE_PROJECT: ios/DeliveryStep.xcodeproj
        XCODE_SCHEME: DeliveryStep
    scripts:
      - name: Generate App Icon (1024x1024) from play store icon
        script: |
          sips -z 1024 1024 play_store_icon_512.png \
            --out ios/DeliveryStep/Assets.xcassets/AppIcon.appiconset/AppIcon_1024.png
      - name: Set up keychain
        script: keychain initialize
      - name: Create certificate and provisioning profile
        script: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /tmp/dist_key.pem
          CERT_OUTPUT=$(app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/dist_key.pem \
            --save 2>&1)
          echo "$CERT_OUTPUT"
          CERT_ID=$(echo "$CERT_OUTPUT" | grep "^Id:" | awk '{print $2}')
          echo "Certificate ID: $CERT_ID"
          keychain add-certificates
          ALL_BUNDLES=$(app-store-connect list-bundle-ids 2>&1)
          echo "$ALL_BUNDLES"
          BUNDLE_RESOURCE_ID=$(echo "$ALL_BUNDLES" | \
            awk '/^Id:/{id=$2} /com\.deliverystep\.app/{print id; exit}')
          echo "Bundle Resource ID: $BUNDLE_RESOURCE_ID"
          app-store-connect profiles create \
            "$BUNDLE_RESOURCE_ID" \
            --type IOS_APP_STORE \
            --certificate-ids "$CERT_ID" \
            --save
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - ihsanullah.danish5000@gmail.com
        notify:
          success: true
          failure: true
